version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/streamapp/streamapp

linters:
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - goconst
    - govet
    - ineffassign
    - misspell
    - nilerr
    - staticcheck
    - unconvert
    - unused
    - wastedassign

  settings:
    errcheck:
      check-type-assertions: true

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US

issues:
  exclude-dirs:
    - web
    - migrations

  exclude-rules:
    # Allow repeated strings in test files
    - path: _test\.go
      linters:
        - goconst

    # Allow unchecked errors in test cleanup/defer
    - path: _test\.go
      text: "Error return value is not checked"
      linters:
        - errcheck
