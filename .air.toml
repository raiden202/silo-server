root = "."
tmp_dir = "tmp"

[build]
  # Build frontend then Go binary
  cmd = "cd web && pnpm run build && cd .. && go build -o ./tmp/silo ./cmd/silo/"
  bin = "./tmp/silo"
  # Pass no extra args — config comes from .env via godotenv
  args_bin = []
  # Watch these extensions
  include_ext = ["go", "ts", "tsx", "css", "html", "sql", "json"]
  # Watch these directories
  include_dir = ["cmd", "internal", "migrations", "web/src", "web/public"]
  # Ignore these directories
  exclude_dir = ["tmp", "web/node_modules", "web/dist", "vendor", "third_party", "docs", "scripts"]
  # Ignore test files for faster builds (tests run separately)
  exclude_regex = ["_test\\.go$"]
  # Wait 500ms after last change before rebuilding (lets rsync finish)
  delay = 500
  # Send SIGTERM for graceful shutdown
  stop_on_error = true
  kill_delay = 500
  send_interrupt = true

[log]
  time = true

[misc]
  clean_on_exit = true
